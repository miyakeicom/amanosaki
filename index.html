<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amano Saki — Planetary Data Analyst</title>
<meta name="description" content="Your suffering has a start date. And an end date.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sumi:#0f0f0f;--sumi2:#161616;--washi:#e8e0d0;--washi-dim:#9e9788;--kinpaku:#b89b5a;--kinpaku-dim:#8a7440;--kinpaku-bright:#d4b56a;--display:'Cormorant Garamond',Georgia,serif;--body:'EB Garamond',Georgia,serif}
html{font-size:17px}
body{background:var(--sumi);color:var(--washi);font-family:var(--body);line-height:1.8;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#rippleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
a{color:var(--kinpaku);text-decoration:none}
::selection{background:var(--kinpaku);color:var(--sumi)}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 24px;position:relative;z-index:1}
.hero-line{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--kinpaku-dim));margin-bottom:48px}
.welcome-sm{font-family:var(--display);font-size:clamp(.85rem,2vw,1rem);letter-spacing:.4em;text-transform:uppercase;color:var(--kinpaku-dim);margin-bottom:8px}
.welcome-lg{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:.3em;text-transform:uppercase;color:var(--kinpaku);margin-bottom:48px}
.hero h1{font-family:var(--display);font-weight:300;font-size:clamp(1.6rem,4.5vw,2.8rem);line-height:1.35;color:var(--washi);margin-bottom:16px}
.hero h1 em{font-style:italic;color:var(--kinpaku);font-weight:400}
.hero-sub{font-size:.88rem;color:var(--washi-dim);max-width:400px;margin-bottom:56px}
.birth-input{text-align:center}
.birth-input label{display:block;font-family:var(--display);font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;color:var(--kinpaku-dim);margin-bottom:20px}
.birth-fields{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.birth-fields select{background:var(--sumi2);border:1px solid rgba(184,155,90,.25);border-radius:2px;color:var(--washi);font-family:var(--display);font-size:1.1rem;padding:10px 8px;text-align:center;outline:none;cursor:pointer}
.birth-fields select option{background:var(--sumi2);color:var(--washi)}
.birth-fields select:focus{border-color:var(--kinpaku)}
#bMonth{width:90px}#bDay{width:70px}#bYear{width:82px}
.birth-fields .sep{color:var(--kinpaku-dim);font-family:var(--display);font-size:1.2rem}
.birth-go{margin-top:24px;background:transparent;border:1px solid var(--kinpaku-dim);font-family:var(--display);font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;color:var(--kinpaku);cursor:pointer;padding:12px 32px;transition:all .4s}
.birth-go:hover{background:var(--kinpaku);color:var(--sumi)}
.footer{text-align:center;padding:40px 24px;position:relative;z-index:1}
.footer-copy{font-size:.68rem;color:var(--washi-dim);opacity:.25}
@media(max-width:600px){html{font-size:16px}.hero{padding:60px 20px}.birth-fields select{font-size:1rem}}
</style>
</head>
<body>
<canvas id="rippleCanvas"></canvas>
<section class="hero">
  <div class="hero-line"></div>
  <p class="welcome-sm">Welcome to</p>
  <p class="welcome-lg">Amano Saki</p>
  <h1>Your suffering has a start date.<br>And an <em>end date.</em></h1>
  <p class="hero-sub">Enter your birth date. I'll show you.</p>
  <div class="birth-input">
    <label>Date of Birth</label>
    <div class="birth-fields">
      <select id="bMonth"></select>
      <span class="sep">/</span>
      <select id="bDay"></select>
      <span class="sep">/</span>
      <select id="bYear"></select>
    </div>
    <button class="birth-go" onclick="go()">Reveal My Timeline →</button>
  </div>
</section>
<footer class="footer"><p class="footer-copy">© 2026 Amano Saki</p></footer>
<script>
(function(){
  var m=document.getElementById('bMonth'),d=document.getElementById('bDay'),y=document.getElementById('bYear');
  var o;
  o=document.createElement('option');o.value='';o.textContent='Month';o.disabled=true;o.selected=true;m.appendChild(o);
  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(function(n,i){o=document.createElement('option');o.value=i+1;o.textContent=n;m.appendChild(o);});
  o=document.createElement('option');o.value='';o.textContent='Day';o.disabled=true;o.selected=true;d.appendChild(o);
  for(var i=1;i<=31;i++){o=document.createElement('option');o.value=i;o.textContent=i;d.appendChild(o);}
  o=document.createElement('option');o.value='';o.textContent='Year';o.disabled=true;o.selected=true;y.appendChild(o);
  for(var i=2010;i>=1940;i--){o=document.createElement('option');o.value=i;o.textContent=i;y.appendChild(o);}
})();
function go(){
  var m=document.getElementById('bMonth').value,d=document.getElementById('bDay').value,y=document.getElementById('bYear').value;
  if(!m||!d||!y){alert('Please select your birth date.');return;}
  window.location.href='result.html?m='+m+'&d='+d+'&y='+y;
}
</script>
<script src="bg.js"></script>
</body>
</html>
