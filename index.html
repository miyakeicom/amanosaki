<script>
(function(){
  var m=document.getElementById('bMonth'),d=document.getElementById('bDay'),y=document.getElementById('bYear');
  var o;
  o=document.createElement('option');o.value='';o.textContent='Month';o.disabled=true;o.selected=true;m.appendChild(o);
  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(function(n,i){o=document.createElement('option');o.value=i+1;o.textContent=n;m.appendChild(o);});
  o=document.createElement('option');o.value='';o.textContent='Day';o.disabled=true;o.selected=true;d.appendChild(o);
  for(var i=1;i<=31;i++){o=document.createElement('option');o.value=i;o.textContent=i;d.appendChild(o);}
  o=document.createElement('option');o.value='';o.textContent='Year';o.disabled=true;o.selected=true;y.appendChild(o);
  for(var i=2010;i>=1940;i--){o=document.createElement('option');o.value=i;o.textContent=i;y.appendChild(o);}
})();
function go(){
  var m=document.getElementById('bMonth').value,d=document.getElementById('bDay').value,y=document.getElementById('bYear').value;
  if(!m||!d||!y){alert('Please select your birth date.');return;}
  window.location.href='result.html?m='+m+'&d='+d+'&y='+y;
}
</script>
